# Example only. Copy this into .github/workflows/ when you want CI to run it.
name: LocaLint

on:
  pull_request:
  push:

jobs:
  localization-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fail on critical localization issues
        run: python -m localint.cli path/to/localization.csv --source en --fail-on-critical

      - name: Fail only on new critical issues with a baseline
        run: python -m localint.cli path/to/localization.csv --source en --baseline .localint-baseline.json --fail-on-new-critical
